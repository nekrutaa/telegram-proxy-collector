<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>ЧЕРКЕСОВ НИКИТА ЛОХ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      /* Здесь твоя картинка с собакой */
      background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                  url('photo_2026-02-28_14-25-44.jpg') no-repeat center center fixed;
      background-size: cover;
      color: #fff;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .container {
      background: rgba(0, 0, 0, 0.7);
      padding: 30px;
      border-radius: 20px;
      border: 1px solid #444;
      max-width: 90%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    p {
      color: #ccc;
      margin-bottom: 30px;
      font-size: 1.1rem;
    }
    .proxy-btn {
      display: inline-block;
      padding: 18px 30px;
      background: linear-gradient(135deg, #0088cc, #00ccff);
      color: #fff;
      border-radius: 50px;
      text-decoration: none;
      font-weight: bold;
      font-size: 1.2rem;
      box-shadow: 0 5px 15px rgba(0, 136, 204, 0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .proxy-btn:active {
      transform: scale(0.95);
      box-shadow: 0 2px 10px rgba(0, 136, 204, 0.2);
    }
    .footer {
      margin-top: 20px;
      font-size: 0.8rem;
      color: #888;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>ЧЕРКЕСОВ НИКИТА ЛОХ</h1>
    <p>Нажми на кнопку ниже, чтобы запустить «вечный» прокси через WebSocket мост. Блокировки мимо!</p>

    <!-- Ссылка настроена на TLS/WebSocket прокси (секрет ee...) -->
    <a href="tg://proxy?server=://apple.com.update.is-cool.win&port=443&secret=ee00000000000000000000000000000000676f6f676c652e636f6d" class="proxy-btn" id="connectBtn">
      🚀 ПОДКЛЮЧИТЬ ПРОКСИ
    </a>

    <div class="footer">
      Работает напрямую в Telegram на iOS 26
    </div>
  </div>

  <script>
    // Принудительный запуск для Safari на iPhone 15 Pro
    document.getElementById('connectBtn').onclick = function(e) {
      e.preventDefault();
      const link = this.getAttribute('href');
      window.location.replace(link);
    };
  </script>

</body>
</html>

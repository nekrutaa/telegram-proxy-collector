<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>ЧЕРКЕСОВ НИКИТА ЛОХ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #000;
      color: #fff;
      margin: 0;
      padding: 16px;
    }
    h1 { font-size: 1.6rem; margin-bottom: 10px; text-align: center; }
    p { color: #aaa; margin-bottom: 20px; line-height: 1.4; text-align: center; }
    .proxy-btn {
      display: block;
      margin: 10px 0;
      padding: 12px;
      background: linear-gradient(135deg, #0088cc, #00ccff);
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      text-align: center;
      border: none;
      cursor: pointer;
    }
    .proxy-btn:active { opacity: 0.7; transform: scale(0.98); }
    #proxy-list { margin-top: 12px; }
    .error { color: #ff8080; text-align: center; }
  </style>
</head>
<body>
  <h1>ЧЕРКЕСОВ НИКИТА ЛОХ</h1>
  <p>ЧЕРКЕСОВ НИКИТА ЛОХ</p>

  <div id="proxy-list">Загружаем список прокси…</div>

  <script>
    (async () => {
    const listEl = document.getElementById('proxy-list');
    
    // 1. СНАЧАЛА ДОБАВИМ ТЕСТОВУЮ КНОПКУ (она точно должна открыть окно)
    const testBtn = document.createElement('a');
    testBtn.href = 'tg://proxy?server=95.161.226.230&port=443&secret=ee00000000000000000000000000000000676f6f676c652e636f6d';
    testBtn.className = 'proxy-btn';
    testBtn.style.background = 'linear-gradient(135deg, #ff4b2b, #ff416c)'; // Сделаем её красной
    testBtn.textContent = 'ТЕСТ (Нажми меня первым)';
    listEl.appendChild(testBtn);

    try {
      const url = 'https://githubusercontent.com';
      const resp = await fetch(url);
      const text = await resp.text();
      
      // Очищаем строки и берем только те, что начинаются на https
      const lines = text.split('\n')
                        .map(l => l.trim())
                        .filter(l => l.startsWith('https://t.me?'));

      lines.forEach((link, idx) => {
        // Жесткая замена на tg:// без лишних символов
        const tgLink = link.replace('https://t.me', 'tg://');
        
        const a = document.createElement('a');
        a.href = tgLink;
        a.className = 'proxy-btn';
        a.textContent = 'Прокси #' + (idx + 1);
        
        // Дублируем клик через скрипт для iPhone
        a.onclick = (e) => {
          e.preventDefault();
          window.location.replace(tgLink);
        };
        
        listEl.appendChild(a);
      });

    } catch (e) {
      listEl.innerHTML += '<div class="error">Ошибка загрузки базы.</div>';
    }
  })();

  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>ЧЕРКЕСОВ НИКИТА ЛОХ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      /* Твоя картинка на фоне */
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('photo_2026-02-28_14-25-44.jpg') no-repeat center center fixed;
      background-size: cover;
      color: #fff;
      margin: 0;
      padding: 16px;
    }
    h1 { font-size: 1.6rem; margin-bottom: 10px; text-shadow: 2px 2px 4px #000; }
    p { color: #eee; margin-bottom: 10px; line-height: 1.4; text-shadow: 2px 2px 4px #000; }
    .proxy-btn {
      display: block;
      margin: 8px 0;
      padding: 12px 14px;
      background: linear-gradient(135deg, #0088cc, #00ccff);
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 500;
      text-align: center;
    }
    .proxy-btn:active { opacity: 0.8; }
    #proxy-list { margin-top: 12px; }
    .error { background: rgba(255,0,0,0.2); padding: 10px; border-radius: 10px; }
  </style>
</head>
<body>
  <h1>ЧЕРКЕСОВ НИКИТА ЛОХ</h1>
  <p>ЧЕРКЕСОВ НИКИТА ЛОХ</p>

  <div id="proxy-list">Загружаем список прокси…</div>

  <script>
  (async () => {
    const listEl = document.getElementById('proxy-list');
    try {
      // Берем файл прямо из твоего репозитория
      const resp = await fetch('proxy_all.txt');
      if (!resp.ok) throw new Error('HTTP ' + resp.status);

      const text = await resp.text();
      // Фильтруем только строки с прокси
      const lines = text.split('\n').map(l => l.trim()).filter(l => l.includes('t.me/proxy'));

      if (!lines.length) {
        listEl.textContent = 'Пока нет доступных прокси.';
        return;
      }

      listEl.innerHTML = '';
      lines.forEach((link, idx) => {
        const a = document.createElement('a');
        
        // МАГИЯ ОТКРЫТИЯ: превращаем в tg://
        const startIdx = link.indexOf('t.me/proxy');
        const cleanLink = 'tg://' + link.substring(startIdx + 5);
        
        a.href = cleanLink;
        a.textContent = 'Подключить прокси #' + (idx + 1);
        a.className = 'proxy-btn';
        
        // Принудительный пинок для Safari
        a.onclick = (e) => {
          window.location.href = cleanLink;
          return false;
        };
        
        listEl.appendChild(a);
      });
    } catch (e) {
      console.error(e);
      listEl.innerHTML = '<div class="error">Ошибка: не найден файл proxy_all.txt</div>';
    }
  })();
  </script>
</body>
</html>

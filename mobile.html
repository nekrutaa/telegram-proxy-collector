<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>ЧЕРКЕСОВ НИКИТА ЛОХ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
        body {
      font-family: system-ui, -apple-system, sans-serif;
      /* Вместо mem.jpg напиши название своего файла */
      background: url('photo_2026-02-28_14-25-44.jpg') no-repeat center center fixed; 
      background-size: cover;
      color: #fff;
      margin: 0;
      padding: 16px;
    }

    h1 { font-size: 1.6rem; margin-bottom: 10px; text-align: center; }
    p { color: #aaa; margin-bottom: 20px; line-height: 1.4; text-align: center; }
    .proxy-btn {
      display: block;
      margin: 10px 0;
      padding: 12px;
      background: linear-gradient(135deg, #0088cc, #00ccff);
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      text-align: center;
      border: none;
      cursor: pointer;
    }
    .proxy-btn:active { opacity: 0.7; transform: scale(0.98); }
    #proxy-list { margin-top: 12px; }
    .error { color: #ff8080; text-align: center; }
  </style>
</head>
<body>
  <h1>ЧЕРКЕСОВ НИКИТА ЛОХ</h1>
  <p>ЧЕРКЕСОВ НИКИТА ЛОХ</p>

  <div id="proxy-list">Загружаем список прокси…</div>

  <script>
    (async () => {
    const listEl = document.getElementById('proxy-list');
    
    // 1. СНАЧАЛА ДОБАВИМ ТЕСТОВУЮ КНОПКУ (она точно должна открыть окно)
    const testBtn = document.createElement('a');
    testBtn.href = 'tg://proxy?server=95.161.226.230&port=443&secret=ee00000000000000000000000000000000676f6f676c652e636f6d';
    testBtn.className = 'proxy-btn';
    testBtn.style.background = 'linear-gradient(135deg, #ff4b2b, #ff416c)'; // Сделаем её красной
    testBtn.textContent = 'ТЕСТ (Нажми меня первым)';
    listEl.appendChild(testBtn);

        try {
      // Используем основной файл со всеми прокси
      const url = 'https://allorigins.win' + encodeURIComponent('https://githubusercontent.com');
      const resp = await fetch(url);
      const text = await resp.text();
      
      // Берем только строки, где есть t.me/proxy
      const lines = text.split('\n')
                        .map(l => l.trim())
                        .filter(l => l.includes('t.me/proxy'));

      lines.forEach((link, idx) => {
        // Умная замена: ищем кусок t.me/proxy и превращаем в tg://proxy
        const startIdx = link.indexOf('t.me/proxy');
        if (startIdx === -1) return;
        
        const tgLink = 'tg://' + link.substring(startIdx + 5);
        
        const a = document.createElement('a');
        a.href = tgLink;
        a.className = 'proxy-btn';
        a.textContent = 'Подключить прокси #' + (idx + 1);
        
        a.onclick = (e) => {
          e.preventDefault();
          window.location.href = tgLink;
        };
        
        listEl.appendChild(a);
      });

    } catch (e) {
      listEl.innerHTML += '<div class="error">Ошибка базы. Попробуй обновить страницу позже.</div>';
    }

  })();

  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>ЧЕРКЕСОВ НИКИТА ЛОХ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #000;
      color: #fff;
      margin: 0;
      padding: 16px;
    }
    h1 {
      font-size: 1.6rem;
      margin-bottom: 10px;
    }
    p {
      color: #aaa;
      margin-bottom: 10px;
      line-height: 1.4;
    }
    .proxy-btn {
      display: block;
      margin: 8px 0;
      padding: 10px 14px;
      background: linear-gradient(135deg, #0088cc, #00ccff);
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 500;
      text-align: center;
    }
    .proxy-btn:active {
      opacity: 0.8;
    }
    #proxy-list {
      margin-top: 12px;
    }
    .error {
      color: #ff8080;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <h1>ЧЕРКЕСОВ НИКИТА ЛОХ</h1>
  <p>
    ЧЕРКЕСОВ НИКИТА ЛОХ
  </p>

  <div id="proxy-list">Загружаем список прокси…</div>

  <script>
  (async () => {
    const listEl = document.getElementById('proxy-list');
    try {
      const url = 'https://raw.githubusercontent.com/kort0881/telegram-proxy-collector/main/verified/proxy_links_tme_clean.txt';
      const resp = await fetch(url);
      if (!resp.ok) throw new Error('HTTP ' + resp.status);

      const text = await resp.text();
      const lines = text.split('\n').map(l => l.trim()).filter(Boolean);

      if (!lines.length) {
        listEl.textContent = 'Пока нет доступных прокси.';
        return;
      }

      listEl.innerHTML = '';
            lines.forEach((link, idx) => {
        const a = document.createElement('a');
        
        // Убираем лишние пробелы и принудительно меняем протокол
        const cleanLink = link.trim().replace('https://t.me', 'tg://');
        a.href = cleanLink;
        
        a.textContent = 'Подключить прокси #' + (idx + 1);
        a.className = 'proxy-btn';
        listEl.appendChild(a);
      });

    } catch (e) {
      console.error(e);
      listEl.innerHTML = '<div class="error">Ошибка загрузки списка прокси.</div>';
    }
  })();
  </script>
</body>
</html>

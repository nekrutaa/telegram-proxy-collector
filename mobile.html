<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>ЧЕРКЕСОВ НИКИТА ЛОХ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('photo_2026-02-28_14-25-44.jpg') no-repeat center center fixed;
      background-size: cover;
      color: #fff;
      margin: 0;
      padding: 16px;
    }
    h1, p { text-align: center; text-shadow: 2px 2px 4px #000; }
    .proxy-btn {
      display: block;
      margin: 10px 0;
      padding: 14px;
      background: linear-gradient(135deg, #0088cc, #00ccff);
      color: #fff;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    #proxy-list { margin-top: 20px; }
  </style>
</head>
<body>
  <h1>ЧЕРКЕСОВ НИКИТА ЛОХ</h1>
  <p>ЧЕРКЕСОВ НИКИТА ЛОХ</p>

  <div id="proxy-list">Ищем прокси в файле...</div>

  <script>
  (async () => {
    const listEl = document.getElementById('proxy-list');
    try {
      // Тянем файл прямо из твоего корня
      const resp = await fetch('proxy_all.txt');
      const text = await resp.text();
      
      // Ищем вообще любые упоминания прокси в тексте
      const lines = text.split('\n').map(l => l.trim()).filter(l => l.includes('proxy?'));

      if (lines.length === 0) {
        listEl.textContent = 'В файле proxy_all.txt пусто или нет ссылок.';
        return;
      }

      listEl.innerHTML = '';
      lines.forEach((line, idx) => {
        // Вырезаем саму ссылку, если в строке есть лишний мусор
        let cleanLink = line;
        if (line.includes('http')) {
            const start = line.indexOf('t.me/proxy');
            if (start !== -1) cleanLink = 'tg://' + line.substring(start + 5);
        } else if (line.includes('tg://')) {
            cleanLink = line;
        }

        const a = document.createElement('a');
        a.href = cleanLink;
        a.className = 'proxy-btn';
        a.textContent = 'ПОДКЛЮЧИТЬ ПРОКСИ #' + (idx + 1);
        
        // Принудительный клик для iOS
        a.onclick = (e) => {
          window.location.href = cleanLink;
          return false;
        };
        
        listEl.appendChild(a);
      });
    } catch (e) {
      listEl.textContent = 'Ошибка: не удалось прочитать proxy_all.txt';
    }
  })();
  </script>
</body>
</html>
